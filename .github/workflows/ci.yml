name: CI

on:
  push:
    # Branches only — a tag push points at a commit already validated on its
    # branch (checks attach to the SHA, so the release still shows green). This
    # avoids a redundant second run that only re-rolls transient HACS-action /
    # GitHub-API flakiness. NOTE: keep hacs/action@main (HACS validates against
    # its live ruleset; the only pinnable tag, 22.5.0, is 4+ years stale).
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Not (yet) in the home-assistant/brands repo; this is a custom-repo
          # integration, so skip the brands check rather than fail CI on it.
          ignore: brands

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check custom_components/

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements_test.txt
      - run: pytest tests/ -q

  yamllint:
    name: yamllint (legacy package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - run: yamllint -c .yamllint packages/ examples/
